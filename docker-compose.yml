name: openrelay

# Full OpenRelay stack: Postgres, a one-shot migration runner, the relay engine
# (FFmpeg), the control-plane API, and the web dashboard.
#
# Copy .env.example to .env and adjust secrets before running:
#   docker compose up --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openrelay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openrelay}
      POSTGRES_DB: ${POSTGRES_DB:-openrelay}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-openrelay} -d ${POSTGRES_DB:-openrelay}']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: packages/db/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-openrelay}:${POSTGRES_PASSWORD:-openrelay}@postgres:5432/${POSTGRES_DB:-openrelay}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # Real RTMP/SRT ingest server. Streamers push their source feed here; it
  # authorizes publishes against the engine and notifies the engine of source
  # ready/not-ready, which drives the failover state machine.
  mediamtx:
    build:
      context: .
      dockerfile: infra/mediamtx/Dockerfile
    restart: unless-stopped
    environment:
      ENGINE_TOKEN: ${ENGINE_TOKEN:-change-me-engine-shared-secret}
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
    depends_on:
      engine:
        condition: service_started
    ports:
      - '${RTMP_PORT:-1935}:1935'
      - '${SRT_PORT:-8890}:8890/udp'

  engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    restart: unless-stopped
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: ${ENGINE_PORT:-8090}
      ENGINE_TOKEN: ${ENGINE_TOKEN:-change-me-engine-shared-secret}
      # The engine reads source feeds back out of the MediaMTX sidecar.
      INGEST_HOST: mediamtx
      RTMP_PORT: ${RTMP_PORT:-1935}
      SRT_PORT: ${SRT_PORT:-8890}
      ENGINE_SIMULATE: ${ENGINE_SIMULATE:-0}
      MEDIA_DIR: /var/lib/openrelay/media
      # Reconcile persisted DB status back through the API.
      API_CALLBACK_URL: http://api:4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - engine-media:/var/lib/openrelay/media
    ports:
      - '${ENGINE_HOST_PORT:-8090}:8090'

  # S3-compatible object storage for clips / BRB media assets.
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-openrelay}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-openrelay-secret}
    volumes:
      - minio-data:/data
    ports:
      - '${S3_HOST_PORT:-9000}:9000'
      - '${S3_CONSOLE_HOST_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the media bucket and allow anonymous read of objects so the
  # engine/player can fetch clips by URL.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set or http://minio:9000 ${S3_ACCESS_KEY:-openrelay} ${S3_SECRET_KEY:-openrelay-secret} &&
      mc mb -p or/${S3_BUCKET:-openrelay-media} &&
      mc anonymous set download or/${S3_BUCKET:-openrelay-media} &&
      echo 'bucket ready'
      "
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgres://${POSTGRES_USER:-openrelay}:${POSTGRES_PASSWORD:-openrelay}@postgres:5432/${POSTGRES_DB:-openrelay}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ENGINE_URL: http://engine:8090
      ENGINE_TOKEN: ${ENGINE_TOKEN:-change-me-engine-shared-secret}
      # Browser-reachable base URL of this API; clip media is proxied through it.
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:4000}
      PUBLIC_INGEST_HOST: ${PUBLIC_INGEST_HOST:-localhost}
      RTMP_PORT: ${RTMP_PORT:-1935}
      SRT_PORT: ${SRT_PORT:-8890}
      # S3-compatible media storage (MinIO). The engine reads media from the
      # in-network endpoint, so S3_PUBLIC_URL is the internal service URL.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-openrelay-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-openrelay}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-openrelay-secret}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      engine:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports:
      - '${API_PORT:-4000}:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      api:
        condition: service_started
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  postgres-data:
  engine-media:
  minio-data:
